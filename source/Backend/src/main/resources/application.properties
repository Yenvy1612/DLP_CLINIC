spring.application.name=Backend
server.port=${PORT:8080}

# Profile selection: use -Dspring.profiles.active=prod when deploying
spring.profiles.active=dev
# Shared JPA defaults
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# JWT secret for HS256 (must be at least 32 chars)
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:LoExjRRxJY6mZeGg1R74HqgOa3xQ6euDhs6Sd1Vpqasc42DHN+jlwdNzZDZMcnd1N4WgVz8AodQD2BmvPAJoAw==}
app.security.jwt.expiration-minutes=120

# Logging
logging.file.name=logs/backend.log
logging.level.root=INFO
logging.level.com.acare.backend=DEBUG

# ==================== DLP Module Config ====================

# AES-256 encryption key (Base64, 32 bytes).
# Tạo bằng: openssl rand -base64 32
# QUAN TRỌNG: thay bằng key thực tế, không dùng key mặc định này trong production!
dlp.encryption.key=${DLP_ENCRYPTION_KEY:YWNhcmVkbHBzZWNyZXRrZXkxMjM0NTY3ODkw}

# Bật migration mã hóa dữ liệu cũ (chỉ bật lần đầu, sau đó tắt lại)
dlp.encryption.migrate-on-startup=${DLP_MIGRATE_ON_STARTUP:false}

# Redis connection (dùng cho rate limiting)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5000

# DLP Rule Engine properties
rule-definition.time-based-starttime=7
rule-definition.time-based-endtime=22
rule-definition.volume-based=50
rule-definition.request-limit=10
rule-definition.request-window-seconds=60
rule-definition.auto-block-threshold=5
