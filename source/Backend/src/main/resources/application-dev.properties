# Development profile
spring.datasource.url=${DEV_DB_URL}
spring.datasource.username=${DEV_DB_USERNAME}
spring.datasource.password=${DEV_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS
app.security.cors.allowed-origins=${DEV_CORS_ALLOWED_ORIGINS}

# Admin bootstrap (supports both dev/prod)
app.bootstrap.admin.enabled=${DEV_BOOTSTRAP_ADMIN_ENABLED}
app.bootstrap.admin.full-name=${DEV_BOOTSTRAP_ADMIN_FULL_NAME}
app.bootstrap.admin.email=${DEV_BOOTSTRAP_ADMIN_EMAIL}
app.bootstrap.admin.phone=${DEV_BOOTSTRAP_ADMIN_PHONE}
app.bootstrap.admin.id-number=${DEV_BOOTSTRAP_ADMIN_ID_NUMBER}
app.bootstrap.admin.address=${DEV_BOOTSTRAP_ADMIN_ADDRESS}
app.bootstrap.admin.password=${DEV_BOOTSTRAP_ADMIN_PASSWORD}
